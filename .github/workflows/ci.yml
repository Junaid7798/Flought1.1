name: CI

on:
  push:
    branches: [ main, develop, 'feat/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Hex color check
        run: |
          if grep -rE '#[0-9a-fA-F]{3,6}' --include="*.svelte" --include="*.css" --include="*.ts" src/; then
            echo "❌ Hardcoded hex colors found. Use CSS variables instead."
            exit 1
          else
            echo "✅ No hardcoded hex colors"
          fi
