<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="description" content="Flought — Think in graphs. A privacy-first knowledge management app." />
		<meta name="theme-color" content="#22b3ea" />
		<link rel="icon" type="image/png" href="/logo.png" />
		<link rel="apple-touch-icon" href="/logo.png" />
		<link rel="manifest" href="/manifest.json" />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
		<!-- ⚠ Runs synchronously before first paint — prevents light-theme flash on reload -->
		<script>try{var t=localStorage.getItem('flought_theme');if(t==='modern-light')document.documentElement.classList.add('theme-modern-light');}catch(e){}</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<a href="#main-content" class="skip-to-content">Skip to content</a>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
